name: Security Audit

on:
  schedule:
    - cron: "0 9 * * 1"
  pull_request:
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - backend
          - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.target }}

      - name: Run npm audit (high+)
        run: npm audit --audit-level=high
        working-directory: ${{ matrix.target }}

  token-encryption-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: npm ci

      - name: Run token encryption test
        run: node tests/security/token-encryption.test.js
