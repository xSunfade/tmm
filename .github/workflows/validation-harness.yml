name: Validation Harness

on:
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    env:
      # Dummy values: backend/supabaseClient.js throws at import time without
      # them, and unit tests only need the module to load (no network calls).
      # Lazy client init lands in Phase 1.5 (FRAGILE-6); drop these then.
      SUPABASE_URL: "https://ci-dummy.supabase.co"
      SUPABASE_PUBLISHABLE_KEY: "sb_publishable_ci_dummy"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Run unit tests (backend + simulation + sheets-diff)
        run: npm run test:unit

  validation:
    runs-on: ubuntu-latest
    env:
      VALIDATION_MODE: "true"
      RUN_DB_VALIDATION: "false"
      # Honest setting: the Playwright parity spec needs a running frontend
      # (localhost:5173) and real Supabase test-user credentials, neither of
      # which exists in CI yet. Re-enable when Phase 5.11 stands up a seeded
      # local stack in CI.
      RUN_PLAYWRIGHT_PARITY: "false"
      PRODUCTION_GUARD: "true"
      PLAID_ENV: "sandbox"
      CHAOS_SEED: "1337"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Run validation suites
        run: npm run test:validation:ci

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: validation-artifacts
          path: |
            tests/validation/artifacts/**
            tests/validation/*REPORT*.md
            tests/validation/*TESTS*.md
